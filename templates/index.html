<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/static/manifest/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/manifest/icon-192.png">
    <meta name="apple-mobile-web-app-title" content="SkillMap">
    <title>SkillMap | Hyperlocal Talent Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #4F46E5; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
    
    <!-- Hero Area -->
    <div id="landing-card" class="max-w-md w-full p-8 text-center text-white">
        <div class="w-24 h-24 bg-white text-indigo-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-2xl animate-bounce">
            <i class="fas fa-map-marked-alt text-4xl"></i>
        </div>
        <h1 class="text-6xl font-black mb-4 tracking-tighter">SkillMap</h1>
        <p class="text-indigo-100 text-lg mb-12 font-medium">Hyperlocal Talent Network • Find help or offer skills in seconds.</p>
        
        <button onclick="openAuthModal()" class="w-full bg-white text-indigo-600 py-6 rounded-[2rem] font-black uppercase tracking-widest text-sm shadow-2xl hover:scale-105 active:scale-95 transition-all">
            Get Started
        </button>
        <button id="install-app-btn" class="hidden w-full mt-4 bg-indigo-900/30 border border-white/30 text-white py-4 rounded-[1.5rem] font-bold tracking-wide backdrop-blur hover:bg-indigo-900/40 transition-all">
            Install App
        </button>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6"><i class="fas fa-shield-alt text-2xl"></i></div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Welcome</h2>
            <p class="text-slate-500 mb-8">Enter your email to receive an OTP</p>
            <div id="otp-request">
                <input type="email" id="auth-email" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 ring-indigo-600 text-center text-lg mb-6" placeholder="name@email.com">
                <button onclick="requestOTP()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl">Send Code</button>
            </div>
            <div id="otp-verify" class="hidden">
                <input type="text" maxlength="6" id="auth-otp" class="w-full bg-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 ring-indigo-600 text-center text-2xl tracking-[0.5em] font-bold mb-6" placeholder="000000">
                <button onclick="verifyOTP()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl">Verify & Login</button>
            </div>
        </div>
    </div>

    <!-- Role Choice Modal -->
    <div id="role-choice-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[150] flex items-center justify-center p-4 hidden">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onclick="selectInitialRole('user')" class="glass p-10 rounded-[3rem] text-center border-4 border-transparent hover:border-indigo-600 transition-all cursor-pointer group">
                <div class="w-24 h-24 bg-indigo-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-4xl shadow-2xl group-hover:scale-110 transition"><i class="fas fa-hand-holding-heart"></i></div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">Hire Help</h3>
                <p class="text-slate-500">Book local professionals for your tasks.</p>
            </div>
            <div onclick="selectInitialRole('partner')" class="glass p-10 rounded-[3rem] text-center border-4 border-transparent hover:border-indigo-600 transition-all cursor-pointer group">
                <div class="w-24 h-24 bg-slate-800 rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-4xl shadow-2xl group-hover:scale-110 transition"><i class="fas fa-tools"></i></div>
                <h3 class="text-2xl font-bold text-slate-800 mb-2">Join as Partner</h3>
                <p class="text-slate-500">Offer your skills and start earning.</p>
            </div>
        </div>
    </div>

    <!-- Registration Modals -->
    <div id="customer-register-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[40px] w-full max-w-md p-8 shadow-2xl">
            <h2 class="text-3xl font-black text-slate-800 mb-2">Profile Setup</h2>
            <form id="customer-form" class="space-y-6">
                <input type="text" name="name" required class="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 outline-none focus:ring-2 ring-indigo-600" placeholder="Full Name">
                <input type="tel" name="phone" required class="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 outline-none focus:ring-2 ring-indigo-600" placeholder="Phone Number">
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl">Complete Setup</button>
            </form>
        </div>
    </div>

    <div id="register-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4 hidden overflow-y-auto">
        <div class="bg-white w-full max-w-lg rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Partner Onboarding</h2>
            <form id="worker-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" name="name" required class="w-full bg-slate-100 rounded-xl px-4 py-3 outline-none" placeholder="Full Name">
                    <select name="skill" required class="w-full bg-slate-100 rounded-xl px-4 py-3 outline-none">
                        <option>Plumber</option><option>Electrician</option><option>Tutor</option><option>Carpenter</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" name="phone" required class="w-full bg-slate-100 rounded-xl px-4 py-3 outline-none" placeholder="WhatsApp Number">
                    <input type="number" name="experience" required class="w-full bg-slate-100 rounded-xl px-4 py-3 outline-none" placeholder="Years of Exp.">
                </div>
                <input type="number" name="price" required class="w-full bg-slate-100 rounded-xl px-4 py-3 outline-none" placeholder="Base Price (₹)">
                <textarea name="bio" required class="w-full bg-slate-100 rounded-xl px-4 py-3 outline-none h-24" placeholder="Tell us more about your skills..."></textarea>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">Photo Upload</label><input type="file" name="photo" accept="image/*" required class="text-sm"></div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">Register as Partner</button>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        window.addEventListener('load', () => {
            const role = localStorage.getItem('userRole');
            if (role === 'customer') window.location.href = '/customer';
            if (role === 'partner') window.location.href = '/partner';
        });
    </script>
</body>
</html>
