<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/static/manifest/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/manifest/icon-192.png">
    <meta name="apple-mobile-web-app-title" content="SkillMap">
    <title>SkillMap | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
        }
    </style>
</head>

<body class="bg-slate-50">

    <!-- Admin Dashboard (Full Screen) -->
    <div id="admin-dashboard-ui" class="min-h-screen">
        <div class="p-8 max-w-6xl mx-auto pb-32">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-black text-slate-800">System Control</h2>
                    <p class="text-indigo-600 font-bold uppercase tracking-widest text-xs">Admin Dashboard • Real-time Stats</p>
                </div>
                <button onclick="window.location.href='/'" class="bg-white text-slate-800 px-6 py-3 rounded-2xl font-bold shadow-sm border border-slate-200 hover:bg-slate-50 transition">Exit Admin</button>
            </div>
            <div id="admin-status-banner" class="hidden mb-6 rounded-2xl px-4 py-3 text-sm font-bold"></div>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Users</p>
                    <h3 id="admin-total-users" class="text-3xl font-black text-slate-800">0</h3>
                </div>
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Active Partners</p>
                    <h3 id="admin-total-workers" class="text-3xl font-black text-indigo-600">0</h3>
                </div>
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Jobs</p>
                    <h3 id="admin-total-jobs" class="text-3xl font-black text-slate-800">0</h3>
                </div>
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Revenue</p>
                    <h3 id="admin-total-earnings" class="text-3xl font-black text-green-500">₹0</h3>
                </div>
            </div>

            <!-- Management Tabs -->
            <div class="flex gap-4 mb-8">
                <button onclick="showAdminTab('partners')" id="tab-partners" class="px-6 py-2 rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-lg shadow-indigo-100">Partners</button>
                <button onclick="showAdminTab('users')" id="tab-users" class="px-6 py-2 rounded-xl font-bold text-sm bg-white text-slate-600 hover:bg-slate-100 transition">Users</button>
                <button onclick="showAdminTab('jobs')" id="tab-jobs" class="px-6 py-2 rounded-xl font-bold text-sm bg-white text-slate-600 hover:bg-slate-100 transition">Transactions</button>
            </div>

            <div id="admin-content-area" class="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-bottom border-slate-100">
                            <tr id="admin-table-head">
                                <!-- Dynamic -->
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100 text-sm">
                            <!-- Dynamic -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Modal (Added for Admin to view users) -->
    <div id="profile-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden my-auto">
            <button onclick="closeModal('profile-modal')" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 z-10"><i class="fas fa-times text-xl"></i></button>
            <div class="relative z-10">
                <div class="w-24 h-24 bg-indigo-600 rounded-3xl flex items-center justify-center text-white text-4xl font-bold mb-6 shadow-xl shadow-indigo-200" id="profile-initials">?</div>
                <h2 class="text-3xl font-bold text-slate-800 mb-1" id="profile-name">User Profile</h2>
                <p class="text-slate-500 mb-8" id="profile-email">email@example.com</p>
                <div id="worker-details" class="hidden mb-6 p-6 bg-slate-50 rounded-[2rem] border border-slate-100">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-xl font-black text-slate-800" id="profile-skill">Partner</p>
                            <p class="text-sm text-indigo-600 font-bold" id="profile-price">₹0/hr</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rating</p>
                             <p class="text-lg font-black text-indigo-600" id="profile-rating">5.0 ★</p>
                        </div>
                    </div>
                    <div class="mb-4">
                         <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Experience</p>
                         <p class="text-sm font-bold text-slate-700"><span id="profile-experience">0</span> Years</p>
                    </div>
                    <div>
                         <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">About</p>
                         <p id="profile-bio" class="text-xs text-slate-500 leading-relaxed">No bio provided.</p>
                    </div>
                </div>
                <div id="worker-badge" class="hidden"></div>
                <div id="register-worker-prompt" class="hidden"></div>
            </div>
        </div>
    </div>

    <script src="{{ asset_url('js/app.js') }}"></script>
    <script>
        // Auto-load stats for admin
        window.onload = () => {
             loadAdminStats();
             showAdminTab('partners');
        };
    </script>
</body>
</html>
